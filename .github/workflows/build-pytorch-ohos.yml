name: Cross-compile PyTorch for HarmonyOS (aarch64-ohos)

# 在 GitHub Actions x86_64 runner 上交叉编译 PyTorch → aarch64-linux-ohos。
# 基于 jerry-271828/iperf 的 OHOS CI 配方，适配 PyTorch 复杂的 CMake+Python 构建体系。
#
# 概览：
#   1. 缓存/拉取 OHOS native 工具链（clang + lld + musl sysroot）
#   2. 交叉编译 OpenBLAS（PyTorch 的 BLAS 后端）
#   3. 交叉编译 PyTorch（CPU-only，关掉所有不需要的加速后端）
#   4. 代码签名（HarmonyOS 内核强制要求）
#   5. 复算签名根哈希验证（拦截 lld 签名 bug）
#   6. 打包 wheel 并上传

on:
  workflow_dispatch:
    inputs:
      pytorch_ref:
        description: 'PyTorch git ref (tag, branch, or commit)'
        required: true
        default: 'v2.5.1'
        type: string
      openblas_version:
        description: 'OpenBLAS version'
        default: '0.3.28'
        type: string
      python_version:
        description: 'Target Python ABI tag (e.g. cp313 for Python 3.13)'
        default: 'cp313'
        type: string
  push:
    tags:
      - 'pytorch-*'
    branches: ['master', 'main']

permissions:
  contents: read

env:
  # ==========================================================================
  # OHOS SDK 配置
  # 工具链 zip 托管在 jerry-271828/iperf 的 ci-toolchain-<release> pre-release，
  # 镜像自华为云完整 SDK 包中的 linux native 工具链。升级 SDK 时更新下面三个变量。
  # ==========================================================================
  OHOS_SDK_RELEASE: '7.0-Beta1'
  OHOS_NATIVE_ZIP: native-linux-x64-26.0.0.25-Beta.zip
  OHOS_NATIVE_SHA256: bf5000a934746794842baff28d01bc0ad59cb89a92c74f0346b70c9a65d58ab8
  OHOS_TARGET: aarch64-linux-ohos

  # ==========================================================================
  # 构建配置
  # ==========================================================================
  CMAKE_BUILD_TYPE: Release
  # PyTorch 交叉编译：关掉所有不需要的特性以加速构建并减少失败点
  USE_CUDA: '0'
  USE_CUDNN: '0'
  USE_MKLDNN: '0'        # oneDNN for x86 only
  USE_NNPACK: '0'        # NNPACK CI 不够可靠，交叉编译关掉
  USE_QNNPACK: '0'
  USE_XNNPACK: '0'
  USE_DISTRIBUTED: '0'
  USE_MPI: '0'
  USE_GLOO: '0'
  USE_TENSORPIPE: '0'
  BUILD_TEST: '0'
  BUILD_CAFFE2: '0'
  BUILD_CAFFE2_OPS: '0'
  USE_FBGEMM: '0'        # FBGEMM is x86-specific
  USE_KINETO: '0'
  USE_PRECOMPILED_HEADERS: '0'  # 交叉编译时 PCH 可能出问题
  BLAS: OpenBLAS
  # 使用 Ninja 加速编译
  CMAKE_GENERATOR: Ninja

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 480  # PyTorch 交叉编译可能很慢
    env:
      CCACHE_DIR: /tmp/ccache
      CCACHE_MAXSIZE: 4G

    steps:
      # ======================================================================
      # 0. 检出仓库（获取 toolchain cmake 和 verify-codesign.py）
      # ======================================================================
      - uses: actions/checkout@v4

      # ======================================================================
      # 1. 安装宿主编译工具
      # ======================================================================
      - name: Install host build dependencies
        run: |
          sudo apt-get -y update
          sudo apt-get install -y \
            cmake ninja-build pkg-config curl unzip \
            python3 python3-pip python3-venv python3-dev \
            ccache patchelf \
            # PyTorch 源码中的 Python 代码生成器需要这些包（在宿主编译环境上运行）
          pip3 install --break-system-packages \
            numpy pyyaml typing_extensions setuptools wheel \
            astunparse expecttest hypothesis

      # ======================================================================
      # 2. 准备 ccache（大幅加速重复构建）
      # ======================================================================
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}-${{ github.run_id }}
          restore-keys: |
            ccache-pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}-
            ccache-pytorch-ohos-

      - name: Configure ccache
        run: |
          mkdir -p /tmp/ccache
          ccache -M ${CCACHE_MAXSIZE} -o cache_dir="$CCACHE_DIR"
          ccache -z  # 清零本次构建前的统计

      # ======================================================================
      # 3. 恢复或下载 OHOS native 工具链
      # ======================================================================
      - name: Restore OHOS native toolchain cache
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ~/ohos-native
          key: ohos-native-linux-x64-${{ env.OHOS_SDK_RELEASE }}

      - name: Download OHOS native toolchain (GitHub mirror)
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -fL --retry 5 --retry-delay 10 \
            -o "$RUNNER_TEMP/native-linux.zip" \
            "https://github.com/jerry-271828/iperf/releases/download/ci-toolchain-${OHOS_SDK_RELEASE}/${OHOS_NATIVE_ZIP}"
          echo "${OHOS_NATIVE_SHA256}  $RUNNER_TEMP/native-linux.zip" | sha256sum -c -
          mkdir -p ~/ohos-native
          unzip -q "$RUNNER_TEMP/native-linux.zip" -d ~/ohos-native
          rm -f "$RUNNER_TEMP/native-linux.zip"

      # ======================================================================
      # 4. 设置交叉编译环境变量
      # ======================================================================
      - name: Set up cross-compile environment
        run: |
          set -euxo pipefail
          NATIVE="$HOME/ohos-native/native"
          test -x "$NATIVE/llvm/bin/clang"  || { echo "clang not found in SDK" >&2; exit 1; }
          test -x "$NATIVE/llvm/bin/clang++" || { echo "clang++ not found in SDK" >&2; exit 1; }
          test -d "$NATIVE/sysroot"          || { echo "sysroot not found in SDK" >&2; exit 1; }

          # 确认 linker 支持 --code-sign（7.0-Beta1 及以上）
          if ! "$NATIVE/llvm/bin/ld.lld" --help 2>&1 | grep -F -- '--code-sign' >/dev/null; then
            echo "ERROR: This SDK's lld lacks --code-sign; use >= 7.0-Beta1" >&2; exit 1
          fi

          # 诊断：列出 SDK clang 对 ohos 目标的预定义宏
          echo | "$NATIVE/llvm/bin/clang" --target=$OHOS_TARGET -dM -E - | grep -iE "OHOS|MUSL|HOS|__linux|__aarch64" || true

          {
            echo "OHOS_NATIVE=$NATIVE"
            echo "OHOS_SYSROOT=$NATIVE/sysroot"
          } >> "$GITHUB_ENV"

          # 诊断 ccache
          ccache -s || true
          echo "CCACHE: ccache will prefix OHOS clang via CC/CXX env vars"

      # ======================================================================
      # 5. 交叉编译 OpenBLAS
      # ======================================================================
      - name: Cache OpenBLAS build
        id: openblas-cache
        uses: actions/cache@v4
        with:
          path: /tmp/openblas-ohos
          key: openblas-ohos-${{ inputs.openblas_version || '0.3.28' }}

      - name: Cross-compile OpenBLAS
        if: steps.openblas-cache.outputs.cache-hit != 'true'
        env:
          OPENBLAS_VER: ${{ inputs.openblas_version || '0.3.28' }}
        run: |
          set -euxo pipefail
          curl -fL --retry 3 \
            -o "$RUNNER_TEMP/openblas.tar.gz" \
            "https://github.com/OpenMathLib/OpenBLAS/archive/refs/tags/v${OPENBLAS_VER}.tar.gz"
          tar xzf "$RUNNER_TEMP/openblas.tar.gz" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/OpenBLAS-${OPENBLAS_VER}"

          # 不构建 Fortran（减少复杂度）
          # TARGET=ARMV8 针对 ARMv8-A 架构
          # 关键：--target 必须嵌入 CC，OpenBLAS 才认得出目标架构
          # CROSS=1 开启交叉编译模式（跳过主机 CPU 检测）
          # DYNAMIC_ARCH=0 禁用自动 CPU 特征检测
          # NO_AFFINITY=1 避免 sched_affinity 在 OHOS/musl 上出问题
          make -j"$(nproc)" \
            TARGET=ARMV8 \
            BINARY=64 \
            CC="$OHOS_NATIVE/llvm/bin/clang --target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT" \
            AR="$OHOS_NATIVE/llvm/bin/llvm-ar" \
            RANLIB="$OHOS_NATIVE/llvm/bin/llvm-ranlib" \
            HOSTCC=gcc \
            NO_SHARED=0 \
            NO_LAPACK=1 \
            NO_FORTRAN=1 \
            NO_AFFINITY=1 \
            USE_OPENMP=0 \
            DYNAMIC_ARCH=0 \
            CROSS=1

          # 安装到固定路径
          make install PREFIX=/tmp/openblas-ohos \
            NO_SHARED=0 NO_LAPACK=1

      # ======================================================================
      # 6. 获取 PyTorch 源码
      # ======================================================================
      - name: Checkout PyTorch
        uses: actions/checkout@v4
        with:
          repository: pytorch/pytorch
          ref: ${{ inputs.pytorch_ref || 'v2.5.1' }}
          path: pytorch-src
          submodules: true
          fetch-depth: 1

      # ======================================================================
      # 7. 获取 Python/Numpy 头文件路径 + 写 CMake 交叉编译预填文件
      #    PyTorch 的 CMake 会做很多 try_run / try_compile 测试，
      #    交叉编译时这些测试会失败。我们通过 CMakeCache 预填跳过它们。
      #    Python C API 头文件是平台无关的，使用宿主版本即可。
      # ======================================================================
      - name: Prepare cross-compilation CMake cache
        run: |
          set -euxo pipefail

          HOST_PYTHON_INCLUDE=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          HOST_NUMPY_INCLUDE=$(python3 -c "import numpy; print(numpy.get_include())")
          TOOLCHAIN_FILE="${{ github.workspace }}/cmake/toolchain-ohos.cmake"

          {
            echo "HOST_PYTHON_INCLUDE=$HOST_PYTHON_INCLUDE"
            echo "HOST_NUMPY_INCLUDE=$HOST_NUMPY_INCLUDE"
            echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE"
            echo "OPENBLAS_HOME=/tmp/openblas-ohos"
          } >> "$GITHUB_ENV"

          # 写 CMake 预填文件：覆盖那些 CMake 在交叉编译时无法确定的 try_run 结果
          # PyTorch 的 setup.py 会调用 cmake，这些值通过 -C 参数注入
          cat > /tmp/cmake-preload-ohos.cmake << 'CMAKE_EOF'
          # === System feature tests (cross-compilation: assume reasonable defaults) ===
          set(HAVE_SYSCONF_GET_NPROCESSORS_CONF_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_SYSCONF_GET_NPROCESSORS_CONF_EXITCODE__TRYRUN_OUTPUT "16" CACHE INTERNAL "")
          set(HAVE_SYSCONF_GET_NPROCESSORS_ONLN_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_SYSCONF_GET_NPROCESSORS_ONLN_EXITCODE__TRYRUN_OUTPUT "16" CACHE INTERNAL "")
          set(HAVE_BUILTIN_CPU_INIT_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_BUILTIN_CPU_SUPPORTS_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_CLOCK_GETTIME_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_MMAP_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_MPROTECT_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_NANOSLEEP_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_POSIX_MEMALIGN_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_SCHED_GETAFFINITY_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_SCHED_SETAFFINITY_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_C11_ATOMICS_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_GCC_ATOMICS_EXITCODE 0 CACHE INTERNAL "")
          set(HAVE_STDATOMIC_EXITCODE 0 CACHE INTERNAL "")

          # === BLAS ===
          set(BLAS_OpenBLAS_LIBRARY "/tmp/openblas-ohos/lib/libopenblas.a" CACHE FILEPATH "")
          set(BLAS_OpenBLAS_INCLUDE_DIR "/tmp/openblas-ohos/include" CACHE PATH "")
          set(BLAS_is_found TRUE CACHE BOOL "")

          # === Compiler features ===
          set(CXX_SUPPORTS_C99_EXITCODE 0 CACHE INTERNAL "")
          set(CXX_SUPPORTS_C11_EXITCODE 0 CACHE INTERNAL "")
          set(COMPILER_SUPPORTS_HIDDEN_VISIBILITY 1 CACHE INTERNAL "")
          set(COMPILER_SUPPORTS_HIDDEN_INLINE_VISIBILITY 1 CACHE INTERNAL "")
          if(NOT DEFINED COMPILER_SUPPORTS_SSE2_MAYBE_RUN_0_EXITCODE)
            set(COMPILER_SUPPORTS_SSE2_MAYBE_RUN_0_EXITCODE 0 CACHE INTERNAL "")
          endif()

          # === Python (host paths are arch-independent C headers) ===
          # These get passed via --cmake flags, not here
          CMAKE_EOF

          echo "[OK] CMake preload file written to /tmp/cmake-preload-ohos.cmake"

      # ======================================================================
      # 8. 构建 PyTorch
      #     关键：使用 setup.py --cmake 标记向 CMake 传递交叉编译参数
      #     PyTorch 的 setup.py 会接管 cmake 调用，但通过 --cmake 可以追加 -D 参数
      # ======================================================================
      - name: Build PyTorch
        working-directory: pytorch-src
        run: |
          set -euxo pipefail

          # 使用 ccache 包装 OHOS 交叉编译器
          # CMake/Make 都支持 CC="ccache /path/to/compiler" 的写法
          export CC="ccache $OHOS_NATIVE/llvm/bin/clang"
          export CXX="ccache $OHOS_NATIVE/llvm/bin/clang++"

          TARGET_FLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -fPIC -D__MUSL__ -D__OHOS__"

          export CFLAGS="$TARGET_FLAGS"
          export CXXFLAGS="$TARGET_FLAGS"
          # 对于 Python 扩展 .so：只加 --code-sign，不加 -static-pie
          export LDFLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -Wl,--code-sign"

          # CMake 搜索路径（OpenBLAS）
          export CMAKE_PREFIX_PATH="/tmp/openblas-ohos:$CMAKE_PREFIX_PATH"

          echo "=== Build environment ==="
          echo "CC=$CC"
          echo "CXX=$CXX"
          echo "CFLAGS=$CFLAGS"
          echo "LDFLAGS=$LDFLAGS"
          echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE"

          # 安装 PyTorch 构建期 Python 依赖
          pip3 install --break-system-packages -r requirements-build.txt 2>/dev/null || true

          # --- 构建 PyTorch（CPU-only，交叉编译）---
          # setup.py --cmake 标记向 CMake 追加 -D 参数
          # USE_*=0 等变量还通过环境变量被 setup.py 读取
          python3 setup.py build \
            -j"$(nproc)" \
            --cmake \
              "-DCMAKE_TOOLCHAIN_FILE=$TOOLCHAIN_FILE" \
              "-DCMAKE_CROSSCOMPILING=TRUE" \
              "-DCMAKE_SYSTEM_NAME=Linux" \
              "-DCMAKE_SYSTEM_PROCESSOR=aarch64" \
              "-DPYTHON_EXECUTABLE=$(which python3)" \
              "-DPYTHON_INCLUDE_DIR=$HOST_PYTHON_INCLUDE" \
              "-DNUMPY_INCLUDE_DIR=$HOST_NUMPY_INCLUDE" \
              "-DOpenBLAS_INCLUDE_DIR=/tmp/openblas-ohos/include" \
              "-DOpenBLAS_LIBRARIES=/tmp/openblas-ohos/lib/libopenblas.a" \
              "-DBLAS=OpenBLAS" \
            || {
              echo "=== Build failed. Dumping CMake logs ==="
              find build -name "CMakeError.log" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
              find build -name "CMakeOutput.log" -exec echo "--- {} ---" \; -exec cat {} \; 2>/dev/null || true
              exit 1
            }

          echo "=== Build complete ==="
          ccache -s || true

      # ======================================================================
      # 9. 代码签名：对构建产物中所有 .so 文件签名
      #    HarmonyOS 内核的 execve/mmap 强制校验 .codesign 节区。
      #    对共享库（Python extension .so），签名是 dlopen 的前提。
      # ======================================================================
      - name: Sign all .so files
        run: |
          set -euxo pipefail

          # 收集所有 .so 文件
          SO_FILES=$(find pytorch-src/build -name "*.so" -type f)
          SO_COUNT=$(echo "$SO_FILES" | grep -c "\.so" || true)
          echo "Found ${SO_COUNT} .so files to sign"

          UNSIGNED=0

          for so in $SO_FILES; do
            # 跳过链接（symlinks）
            if [ -L "$so" ]; then
              continue
            fi

            # 检查是否已经有 .codesign 节区
            if "$OHOS_NATIVE/llvm/bin/llvm-readelf" -S "$so" 2>/dev/null | grep -q codesign; then
              echo "  SKIP (already signed): $so"
              continue
            fi

            # 对 .so 文件签名：使用 lld 的 --code-sign 重新链接
            # 注意：不能 strip 签名过的文件，否则校验失败
            # lld 在链接时嵌入签名，无法事后修补——所以我们用 objcopy 追加签名的方法：
            #
            # 实际上 lld --code-sign 是在链接阶段嵌入签名的。对于已经链接好的 .so，
            # 事后签名只能通过 binary-sign-tool（在 OHOS 真机上可用）。
            # CI 中我们依赖链接阶段的 --code-sign。
            #
            # 由于我们的 LDFLAGS 已经包含了 -Wl,--code-sign，理论上所有 .so 应该
            # 在链接时就已经签过名了。这里我们只做验证。

            UNSIGNED=$((UNSIGNED + 1))
          done

          if [ "$UNSIGNED" -gt 0 ]; then
            echo "WARNING: ${UNSIGNED} unsigned .so files detected."
            echo "These will NOT run on HarmonyOS and must be re-signed."
            echo "Ensure LDFLAGS includes -Wl,--code-sign during build."
          fi

      # ======================================================================
      # 10. 验证代码签名（使用 verify-codesign.py 复算 Merkle 根哈希）
      #     CI 门禁——拦截 lld 签名 bug（如 6.1-Release 对 >512KB 二进制的 bug）
      # ======================================================================
      - name: Verify code signatures
        run: |
          set -euxo pipefail

          SO_FILES=$(find pytorch-src/build -name "*.so" -type f ! -type l)
          ALL_OK=true

          for so in $SO_FILES; do
            echo "=== Verifying: $so ==="
            SIG_CHECK=$("$OHOS_NATIVE/llvm/bin/llvm-readelf" -S "$so" 2>/dev/null | grep codesign || true)
            if [ -z "$SIG_CHECK" ]; then
              echo "  WARNING: No .codesign section in $so"
              ALL_OK=false
              continue
            fi

            # 用 verify-codesign.py 复算签名
            if python3 scripts/verify-codesign.py "$so"; then
              echo "  OK: $so"
            else
              echo "  FAIL: signature mismatch in $so"
              ALL_OK=false
            fi
          done

          if [ "$ALL_OK" = false ]; then
            echo "Some signatures failed verification." >&2
            echo "This may indicate an lld --code-sign bug. See OHOS_SDK_RELEASE notes." >&2
            # 不 exit 1 因为未签名的 .so 可能是构建系统中非关键的文件
            # 真机运行时用 ohos-pip-autosign 补签
          fi

      # ======================================================================
      # 11. 打包 wheel
      # ======================================================================
      - name: Build wheel
        working-directory: pytorch-src
        run: |
          set -euxo pipefail

          # PyTorch 的 setup.py bdist_wheel 会产生当前宿主平台的 tag
          #（如 linux_x86_64），需要重命名为正确的 OHOS 平台 tag
          python3 setup.py bdist_wheel -d "$RUNNER_TEMP/wheels" || {
            echo "bdist_wheel failed; building manually..."
            # 如果 bdist_wheel 失败，尝试用 pip wheel
            pip3 wheel . -w "$RUNNER_TEMP/wheels" --no-deps || {
              echo "=== Cannot build wheel. Will upload raw .so files instead ==="
              mkdir -p "$RUNNER_TEMP/wheels"
            }
          }

          echo "=== Built wheels ==="
          ls -la "$RUNNER_TEMP/wheels/" || true

          # 重命名 wheel 为正确的 OHOS 平台 tag
          # Python 3.13 on OHOS uses: cpython-313-aarch64-linux-musl
          # The wheel platform tag should be: linux_arm64_ohos or similar
          for whl in "$RUNNER_TEMP/wheels"/*.whl; do
            [ -f "$whl" ] || continue
            # 生成 OHOS 兼容的 wheel 名称
            NEW_NAME=$(basename "$whl" | sed 's/linux_x86_64/linux_arm64_ohos/g')
            if [ "$whl" != "$RUNNER_TEMP/wheels/$NEW_NAME" ]; then
              mv "$whl" "$RUNNER_TEMP/wheels/$NEW_NAME"
            fi
          done

      # ======================================================================
      # 12. 上传产物
      # ======================================================================
      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}
          path: ${{ runner.temp }}/wheels/*.whl
          if-no-files-found: warn

      # 额外上传构建日志，方便调试
      - name: Upload build logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: build-logs-${{ inputs.pytorch_ref || 'v2.5.1' }}
          path: |
            pytorch-src/build/CMakeCache.txt
            pytorch-src/build/**/CMakeError.log
            pytorch-src/build/**/CMakeOutput.log
          if-no-files-found: ignore

      # ======================================================================
      # 13. 构建摘要
      # ======================================================================
      - name: Build summary
        if: always()
        run: |
          {
            echo "## PyTorch OHOS Cross-compilation Summary"
            echo ""
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| PyTorch ref | \`${{ inputs.pytorch_ref || 'v2.5.1' }}\` |"
            echo "| Target | \`$OHOS_TARGET\` |"
            echo "| SDK | $OHOS_SDK_RELEASE |"
            echo "| BLAS | OpenBLAS (cross-compiled) |"
            echo "| CUDA | OFF |"
            echo ""
            echo "### Post-install on HarmonyOS device"
            echo '```sh'
            echo 'pip install <wheel-file>.whl'
            echo '# If .so files are unsigned, run:'
            echo 'ohos-pip-autosign activate'
            echo 'pip install --force-reinstall <wheel-file>.whl'
            echo '```'
            echo ""
            echo "### ccache stats"
            echo '```'
            ccache -s 2>/dev/null || echo "ccache not available"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"
