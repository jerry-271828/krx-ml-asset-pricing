name: Cross-compile PyTorch for HarmonyOS (aarch64-ohos)

# 两阶段 CI：阶段 1 构建依赖（成功后缓存），阶段 2 构建 PyTorch。
# 这样 PyTorch 构建失败时，依赖已经缓存，重试无需重头开始。

on:
  workflow_dispatch:
    inputs:
      pytorch_ref:
        description: 'PyTorch git ref'
        default: 'v2.5.1'
        type: string
      openblas_version:
        description: 'OpenBLAS version'
        default: '0.3.28'
        type: string
      skip_deps:
        description: 'Skip dependency build (use cached artifacts)'
        type: boolean
        default: false
  push:
    branches: ['master', 'main']

permissions:
  contents: read

env:
  OHOS_SDK_RELEASE: '7.0-Beta1'
  OHOS_NATIVE_ZIP: native-linux-x64-26.0.0.25-Beta.zip
  OHOS_NATIVE_SHA256: bf5000a934746794842baff28d01bc0ad59cb89a92c74f0346b70c9a65d58ab8
  OHOS_TARGET: aarch64-linux-ohos
  CMAKE_BUILD_TYPE: Release
  USE_CUDA: '0'
  USE_CUDNN: '0'
  USE_MKLDNN: '0'
  USE_NNPACK: '0'
  USE_QNNPACK: '0'
  USE_PYTORCH_QNNPACK: '0'
  USE_XNNPACK: '0'
  USE_DISTRIBUTED: '0'
  USE_MPI: '0'
  USE_GLOO: '0'
  USE_TENSORPIPE: '0'
  BUILD_TEST: '0'
  BUILD_CAFFE2: '0'
  BUILD_CAFFE2_OPS: '0'
  USE_FBGEMM: '0'
  USE_KINETO: '0'
  USE_PRECOMPILED_HEADERS: '0'
  BLAS: OpenBLAS
  CMAKE_GENERATOR: Ninja

##############################################################################
# Job 1: 构建依赖（OpenBLAS + Native Sleef Tools）— 成功后缓存
##############################################################################
jobs:
  build-deps:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get -y update
          sudo apt-get install -y cmake ninja-build curl unzip gcc g++ python3

      # ---- OHOS SDK (cached) ----
      - name: Restore OHOS SDK cache
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ~/ohos-native
          key: ohos-native-linux-x64-${{ env.OHOS_SDK_RELEASE }}

      - name: Download OHOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -fL --retry 3 -o "$RUNNER_TEMP/native-linux.zip" \
            "https://github.com/jerry-271828/iperf/releases/download/ci-toolchain-${OHOS_SDK_RELEASE}/${OHOS_NATIVE_ZIP}"
          echo "${OHOS_NATIVE_SHA256}  $RUNNER_TEMP/native-linux.zip" | sha256sum -c -
          mkdir -p ~/ohos-native
          unzip -q "$RUNNER_TEMP/native-linux.zip" -d ~/ohos-native

      - name: Setup OHOS environment
        run: |
          NATIVE="$HOME/ohos-native/native"
          test -x "$NATIVE/llvm/bin/clang"
          test -d "$NATIVE/sysroot"
          echo "OHOS_NATIVE=$NATIVE" >> "$GITHUB_ENV"
          echo "OHOS_SYSROOT=$NATIVE/sysroot" >> "$GITHUB_ENV"

      # ---- OpenBLAS (cached per-version) ----
      - name: Restore OpenBLAS cache
        id: blas-cache
        uses: actions/cache@v4
        with:
          path: /tmp/openblas-ohos
          key: openblas-ohos-${{ inputs.openblas_version || '0.3.28' }}

      - name: Cross-compile OpenBLAS
        if: steps.blas-cache.outputs.cache-hit != 'true'
        env:
          OPENBLAS_VER: ${{ inputs.openblas_version || '0.3.28' }}
        run: |
          set -euxo pipefail
          curl -fL --retry 3 -o "$RUNNER_TEMP/openblas.tar.gz" \
            "https://github.com/OpenMathLib/OpenBLAS/archive/refs/tags/v${OPENBLAS_VER}.tar.gz"
          tar xzf "$RUNNER_TEMP/openblas.tar.gz" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/OpenBLAS-${OPENBLAS_VER}"
          make -j"$(nproc)" libs \
            TARGET=ARMV8 BINARY=64 \
            CC="$OHOS_NATIVE/llvm/bin/clang --target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT" \
            AR="$OHOS_NATIVE/llvm/bin/llvm-ar" \
            RANLIB="$OHOS_NATIVE/llvm/bin/llvm-ranlib" \
            HOSTCC=gcc \
            NO_SHARED=1 NO_LAPACK=1 NO_FORTRAN=1 \
            NO_AFFINITY=1 USE_OPENMP=0 DYNAMIC_ARCH=0 CROSS=1
          make install PREFIX=/tmp/openblas-ohos NO_SHARED=1 NO_LAPACK=1

##############################################################################
# Job 2: 构建 PyTorch（依赖 Job 1 的缓存）
##############################################################################
  build-pytorch:
    needs: build-deps
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    env:
      CCACHE_DIR: /tmp/ccache
      CCACHE_MAXSIZE: 4G
    steps:
      - uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get -y update
          sudo apt-get install -y cmake ninja-build curl unzip \
            ccache qemu-user-static

      # 设备端 Python 为 3.13（harmonybrew, musl/aarch64），
      # CI 驱动解释器必须同为 3.13，否则 wheel 的 cp 标签与扩展 ABI 不匹配
      - name: Setup Python 3.13
        uses: actions/setup-python@v5
        with:
          python-version: '3.13'

      - name: Install Python build deps
        run: pip install numpy pyyaml typing_extensions setuptools wheel

      # ---- Restore all caches ----
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}-${{ github.run_id }}
          restore-keys: |
            ccache-pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}-
            ccache-pytorch-ohos-

      - name: Configure ccache
        run: |
          mkdir -p /tmp/ccache
          ccache -M ${CCACHE_MAXSIZE} -o cache_dir="$CCACHE_DIR"
          ccache -z

      - name: Restore OHOS SDK cache
        uses: actions/cache@v4
        with:
          path: ~/ohos-native
          key: ohos-native-linux-x64-${{ env.OHOS_SDK_RELEASE }}

      - name: Restore OpenBLAS cache
        uses: actions/cache@v4
        with:
          path: /tmp/openblas-ohos
          key: openblas-ohos-${{ inputs.openblas_version || '0.3.28' }}

      # ---- Setup environment ----
      - name: Setup environment
        run: |
          NATIVE="$HOME/ohos-native/native"
          test -x "$NATIVE/llvm/bin/clang" || { echo "OHOS SDK not found!"; exit 1; }
          test -f /tmp/openblas-ohos/lib/libopenblas.a || { echo "OpenBLAS not found!"; exit 1; }
          {
            echo "OHOS_NATIVE=$NATIVE"
            echo "OHOS_SYSROOT=$NATIVE/sysroot"
          } >> "$GITHUB_ENV"

      # ---- Checkout PyTorch ----
      - name: Checkout PyTorch
        uses: actions/checkout@v4
        with:
          repository: pytorch/pytorch
          ref: ${{ inputs.pytorch_ref || 'v2.5.1' }}
          path: pytorch-src
          submodules: recursive
          fetch-depth: 1

      # ---- Native Sleef Tools (from PyTorch submodule) ----
      - name: Restore native sleef cache
        id: sleef-cache
        uses: actions/cache@v4
        with:
          path: /tmp/sleef-native-install
          key: sleef-native-${{ inputs.pytorch_ref || 'v2.5.1' }}

      - name: Build native sleef tools
        if: steps.sleef-cache.outputs.cache-hit != 'true'
        run: |
          SLEEF_SRC="${{ github.workspace }}/pytorch-src/third_party/sleef"
          mkdir -p /tmp/sleef-native-build && cd /tmp/sleef-native-build
          CC=gcc CXX=g++ cmake "$SLEEF_SRC" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSLEEF_BUILD_GNUABI_LIBS=ON \
            -DSLEEF_BUILD_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=/tmp/sleef-native-install
          CC=gcc CXX=g++ ninja -j"$(nproc)" || true
          mkdir -p /tmp/sleef-native-install/bin
          for tool in mkdisp mkrename mkrename_gnuabi mkalias; do
            find . -name "$tool" -type f -executable -exec cp {} /tmp/sleef-native-install/bin/ \; 2>/dev/null || true
          done
          [ ! -f /tmp/sleef-native-install/bin/mkalias ] && [ -f /tmp/sleef-native-install/bin/mkrename_gnuabi ] && \
            ln -sf mkrename_gnuabi /tmp/sleef-native-install/bin/mkalias
          ls -la /tmp/sleef-native-install/bin/

      # ---- Prepare CMake cache + Macros.h patch ----
      - name: Prepare build
        id: prepare
        run: |
          set -euxo pipefail
          # 使用设备真实的 Python 3.13 头文件（musl/aarch64，取自 harmonybrew python@3.13）。
          # libtorch_python.so 大量使用 CPython 内部结构，pyconfig.h 必须与目标解释器一致；
          # 之前"用 host x86_64 pyconfig.h 顶替"的 hack 不再需要。
          PYHDR_SHA256=2766ff0a6ecd617ec48321f9234b0081b4c9e140755d179af35b1aa558f91798
          curl -fL --retry 3 -o "$RUNNER_TEMP/py-headers.tar.gz" \
            "https://github.com/jerry-271828/iperf/releases/download/ci-toolchain-${OHOS_SDK_RELEASE}/python3.13-ohos-aarch64-headers.tar.gz"
          echo "$PYHDR_SHA256  $RUNNER_TEMP/py-headers.tar.gz" | sha256sum -c -
          mkdir -p /tmp/ohos-py
          tar xzf "$RUNNER_TEMP/py-headers.tar.gz" -C /tmp/ohos-py
          test -f /tmp/ohos-py/python3.13/pyconfig.h

          HOST_NUMPY_INCLUDE=$(python3 -c "import numpy; print(numpy.get_include())")
          TOOLCHAIN_FILE="${{ github.workspace }}/cmake/toolchain-ohos.cmake"
          {
            echo "PYTHON_INCLUDE_DIR=/tmp/ohos-py/python3.13"
            echo "NUMPY_INCLUDE_DIR=$HOST_NUMPY_INCLUDE"
            echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE"
            # 设备 CPython 的 EXT_SUFFIX / 平台，供 bdist_wheel 交叉打包：
            # - SETUPTOOLS_EXT_SUFFIX: torch/_C、functorch/_C 的文件名须能被设备导入器匹配
            # - _PYTHON_HOST_PLATFORM: wheel 平台标签 → linux_aarch64（设备 pip 支持）
            echo "SETUPTOOLS_EXT_SUFFIX=.cpython-313-aarch64-linux-musl.so"
            echo "_PYTHON_HOST_PLATFORM=linux-aarch64"
          } >> "$GITHUB_ENV"

      # ---- Build PyTorch ----
      - name: Build PyTorch
        working-directory: pytorch-src
        run: |
          set +e -xo pipefail  # +e: override GitHub's bash -e default

          export CC="ccache $OHOS_NATIVE/llvm/bin/clang"
          export CXX="ccache $OHOS_NATIVE/llvm/bin/clang++"
          TARGET_FLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -fPIC -D__MUSL__ -D__OHOS__"
          export CFLAGS="$TARGET_FLAGS"
          export CXXFLAGS="$TARGET_FLAGS"
          # ASMFLAGS: CMake 的 ASM 语言不读 CFLAGS，.S 文件必须单独传 --target
          export ASMFLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -fPIC"
          export LDFLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -Wl,--code-sign"

          export CMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE"
          export CMAKE_CROSSCOMPILING=TRUE
          export CMAKE_SYSTEM_NAME=Linux
          export CMAKE_SYSTEM_PROCESSOR=aarch64
          export CMAKE_PREFIX_PATH="/tmp/openblas-ohos"
          # PYTHON_INCLUDE_DIR / NUMPY_INCLUDE_DIR 已由 Prepare build 写入 GITHUB_ENV
          export OpenBLAS_INCLUDE_DIR=/tmp/openblas-ohos/include
          export OpenBLAS_LIBRARIES=/tmp/openblas-ohos/lib/libopenblas.a

          # 安装 musl aarch64 动态链接器 — QEMU 需要它来运行交叉编译的 host 工具
          # OHOS sysroot 不包含此文件，从 Alpine aarch64 仓库下载
          if [ ! -f /lib/ld-musl-aarch64.so.1 ]; then
            MUSL_URL="https://dl-cdn.alpinelinux.org/alpine/v3.21/main/aarch64/musl-1.2.5-r11.apk"
            curl -sL -o /tmp/musl.apk "$MUSL_URL" 2>/dev/null || true
            if [ -f /tmp/musl.apk ]; then
              mkdir -p /tmp/musl-extract && cd /tmp/musl-extract
              tar xzf /tmp/musl.apk 2>/dev/null || true
              # APK 解压后 loader 在 lib/ 下
              LOADER=$(find . -name "ld-musl-aarch64*" 2>/dev/null | head -1)
              if [ -n "$LOADER" ] && [ -f "$LOADER" ]; then
                sudo mkdir -p /lib
                sudo cp "$LOADER" /lib/ld-musl-aarch64.so.1
                sudo chmod +x /lib/ld-musl-aarch64.so.1
                echo "Installed musl loader from Alpine: $(file /lib/ld-musl-aarch64.so.1)"
              else
                echo "WARNING: loader not found in APK (files: $(find . -name 'ld*' | head -5))"
              fi
              cd "$OLDPWD"
            fi
          fi
          ls -la /lib/ld-musl-aarch64.so.1 2>/dev/null || echo "WARNING: musl loader not available — QEMU will fail!"
          # 启用 QEMU binfmt
          sudo update-binfmts --enable qemu-aarch64 2>/dev/null || true

          # 原生编译 protoc（host x86_64），之后替换掉交叉编译的 aarch64 版本。
          PROTOC_SRC="$(pwd)/third_party/protobuf"
          if [ -f "$PROTOC_SRC/cmake/CMakeLists.txt" ]; then
            mkdir -p /tmp/protoc-native && cd /tmp/protoc-native
            # 关键：清除所有 OHOS 交叉编译环境变量，否则 gcc 也会被污染
            env -u CC -u CXX -u CFLAGS -u CXXFLAGS -u LDFLAGS \
                -u CMAKE_TOOLCHAIN_FILE -u CMAKE_PREFIX_PATH \
                -u OHOS_NATIVE -u OHOS_SYSROOT \
              CC=gcc CXX=g++ cmake "$PROTOC_SRC/cmake" -G Ninja \
                -DCMAKE_BUILD_TYPE=Release \
                -DCMAKE_C_COMPILER=gcc \
                -DCMAKE_CXX_COMPILER=g++ \
                -Dprotobuf_BUILD_TESTS=OFF \
                -DCMAKE_INSTALL_PREFIX=/tmp/protoc-install
            env -u CC -u CXX -u CFLAGS -u CXXFLAGS -u LDFLAGS \
              CC=gcc CXX=g++ ninja -j"$(nproc)" protoc 2>&1 | tail -5 || true
            if [ -f protoc ]; then
              cp protoc /tmp/protoc-host
              chmod +x /tmp/protoc-host
              echo "Native protoc built: $(file /tmp/protoc-host)"
            else
              echo "WARNING: protoc native build failed"
            fi
            cd "$OLDPWD"
          fi

          # Install sleef native tools (mkdisp, mkalias) — native build works for these
          # 但 mkrename 必须用交叉编译的 aarch64 版本（QEMU 运行），
          # 因为原生 mkrename_gnuabi 的参数格式与交叉编译版不兼容
          if [ -d /tmp/sleef-native-install/bin ]; then
            for f in /tmp/sleef-native-install/bin/*; do
              name=$(basename "$f")
              if [ "$name" = "mkrename_gnuabi" ]; then
                continue  # skip — 等交叉编译版用 QEMU 跑
              fi
              sudo cp "$f" "/usr/local/bin/$name" 2>/dev/null || true
              sudo ln -sf "/usr/local/bin/$name" "/bin/${name%_gnuabi}" 2>/dev/null || true
              echo "Installed sleef tool: $name"
            done
          fi

          # 交叉编译的 sleef 工具（aarch64）构建后，symlink 到 /bin/
          # QEMU + musl loader 会透明执行它们
          CMAKE_SLEEF_BIN="$(pwd)/build/sleef/src/libm"
          if [ -f "$CMAKE_SLEEF_BIN/mkrename" ]; then
            sudo ln -sf "$CMAKE_SLEEF_BIN/mkrename" /bin/mkrename 2>/dev/null || true
            echo "Linked cross-compiled mkrename (aarch64 via QEMU)"
          fi

          # Patch Macros.h for musl __assert_fail
          python3 "${{ github.workspace }}/scripts/patch-macros-musl.py" c10/macros/Macros.h || echo "Macros.h patch skipped"

          pip3 install --break-system-packages -r requirements-build.txt 2>/dev/null || true

          echo "=== Build environment ==="
          echo "CC=$CC"
          echo "CFLAGS=$CFLAGS"
          echo "LDFLAGS=$LDFLAGS"
          echo "TOOLCHAIN=$CMAKE_TOOLCHAIN_FILE"

          # === Phase 1: CMake configure only ===
          python3 setup.py build --cmake-only || {
            echo "=== CMake configure failed ==="
            find build -name "CMakeError.log" -exec cat {} \; 2>/dev/null
            exit 1
          }

          # === Replace aarch64 protoc with native x86_64 build ===
          # cmake 构建的 protoc 是 aarch64 二进制，QEMU 无法运行（缺 musl loader）
          # 把 build.ninja 中所有对交叉编译 protoc 的引用替换为原生版本
          # ninja 会重建 protoc（覆盖我们的替换），所以改 build.ninja 更可靠
          if [ -f /tmp/protoc-host ]; then
            cp /tmp/protoc-host "$(pwd)/build/bin/protoc-3.13.0.0" 2>/dev/null || true
            # 关键：修改 build.ninja，将所有 protoc 路径指向原生版本
            sed -i "s|$(pwd)/build/bin/protoc-3.13.0.0|/tmp/protoc-host|g" \
              "$(pwd)/build/build.ninja" 2>/dev/null || true
            sed -i "s|build/bin/protoc-3.13.0.0|/tmp/protoc-host|g" \
              "$(pwd)/build/build.ninja" 2>/dev/null || true
            echo "Patched build.ninja: all protoc → /tmp/protoc-host"
          fi

          # === Phase 2: Ninja build (skips already-built aarch64 protoc) ===
          ninja -C build -j"$(nproc)" || {
            echo "=== Build failed ==="
            find build -name "CMakeError.log" -exec cat {} \; 2>/dev/null
            exit 1
          }

          echo "=== Build complete ==="
          ccache -s || true

      # ---- Save ccache (even on failure, so next run is faster) ----
      - name: Save ccache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: /tmp/ccache
          key: ccache-pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}-${{ github.run_id }}

      # ---- Sign + Verify + Package ----
      - name: Verify code signatures
        if: success()
        run: |
          SO_FILES=$(find pytorch-src/build -name "*.so" -type f ! -type l 2>/dev/null)
          ALL_OK=true
          for so in $SO_FILES; do
            if "$OHOS_NATIVE/llvm/bin/llvm-readelf" -S "$so" 2>/dev/null | grep -q codesign; then
              python3 scripts/verify-codesign.py "$so" || ALL_OK=false
            else
              echo "WARNING: unsigned $so"
              ALL_OK=false
            fi
          done
          $ALL_OK && echo "All .so signatures verified" || echo "Some signatures missing/invalid"

      - name: Build wheel
        if: success()
        working-directory: pytorch-src
        run: |
          set -euxo pipefail
          # bdist_wheel 会重新跑 build_ext 来编译 torch/csrc/stub.c（torch._C）并链接
          # libtorch_python.so（aarch64）。该步骤是独立 shell，必须重建交叉编译环境，
          # 否则 distutils 落回 host gcc → "skipping incompatible libtorch_python.so"。
          export CC="ccache $OHOS_NATIVE/llvm/bin/clang"
          export CXX="ccache $OHOS_NATIVE/llvm/bin/clang++"
          TARGET_FLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -fPIC -D__MUSL__ -D__OHOS__"
          # -I 设备头文件须在最前，压过驱动解释器自带的 glibc pyconfig.h
          export CFLAGS="-I$PYTHON_INCLUDE_DIR $TARGET_FLAGS"
          export CXXFLAGS="-I$PYTHON_INCLUDE_DIR $TARGET_FLAGS"
          # distutils 用 LDSHARED 链接扩展；env 中的 LDFLAGS/CFLAGS 会被追加到其后
          # （--code-sign 由 LDFLAGS 带入，HarmonyOS 内核要求所有 .so 带签名段）
          export LDFLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -Wl,--code-sign"
          export LDSHARED="$OHOS_NATIVE/llvm/bin/clang --target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -shared"

          # SETUPTOOLS_EXT_SUFFIX / _PYTHON_HOST_PLATFORM 由 Prepare build 注入：
          # 产物为 torch-*-cp313-cp313-linux_aarch64.whl，_C 后缀为设备 EXT_SUFFIX
          python3 setup.py bdist_wheel -d "$RUNNER_TEMP/wheels"
          ls -la "$RUNNER_TEMP/wheels/"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}
          path: ${{ runner.temp }}/wheels/*.whl
          if-no-files-found: error

      - name: Build summary
        if: always()
        run: |
          {
            echo "## PyTorch OHOS Build"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Ref | ${{ inputs.pytorch_ref || 'v2.5.1' }} |"
            echo "| Target | $OHOS_TARGET |"
            echo "| SDK | $OHOS_SDK_RELEASE |"
            echo ""
            echo "### On device"
            echo '```sh'
            echo 'pip3 install torch-*-cp313-cp313-linux_aarch64.whl'
            echo '```'
            echo ""
            ccache -s 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"
