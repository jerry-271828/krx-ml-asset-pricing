name: Cross-compile PyTorch for HarmonyOS (aarch64-ohos)

# 两阶段 CI：阶段 1 构建依赖（成功后缓存），阶段 2 构建 PyTorch。
# 这样 PyTorch 构建失败时，依赖已经缓存，重试无需重头开始。

on:
  workflow_dispatch:
    inputs:
      pytorch_ref:
        description: 'PyTorch git ref'
        default: 'v2.5.1'
        type: string
      openblas_version:
        description: 'OpenBLAS version'
        default: '0.3.28'
        type: string
      skip_deps:
        description: 'Skip dependency build (use cached artifacts)'
        type: boolean
        default: false
  push:
    branches: ['master', 'main']

permissions:
  contents: read

env:
  OHOS_SDK_RELEASE: '7.0-Beta1'
  OHOS_NATIVE_ZIP: native-linux-x64-26.0.0.25-Beta.zip
  OHOS_NATIVE_SHA256: bf5000a934746794842baff28d01bc0ad59cb89a92c74f0346b70c9a65d58ab8
  OHOS_TARGET: aarch64-linux-ohos
  CMAKE_BUILD_TYPE: Release
  USE_CUDA: '0'
  USE_CUDNN: '0'
  USE_MKLDNN: '0'
  USE_NNPACK: '0'
  USE_QNNPACK: '0'
  USE_XNNPACK: '0'
  USE_DISTRIBUTED: '0'
  USE_MPI: '0'
  USE_GLOO: '0'
  USE_TENSORPIPE: '0'
  BUILD_TEST: '0'
  BUILD_CAFFE2: '0'
  BUILD_CAFFE2_OPS: '0'
  USE_FBGEMM: '0'
  USE_KINETO: '0'
  USE_PRECOMPILED_HEADERS: '0'
  BLAS: OpenBLAS
  CMAKE_GENERATOR: Ninja

##############################################################################
# Job 1: 构建依赖（OpenBLAS + Native Sleef Tools）— 成功后缓存
##############################################################################
jobs:
  build-deps:
    runs-on: ubuntu-24.04
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get -y update
          sudo apt-get install -y cmake ninja-build curl unzip gcc g++ python3

      # ---- OHOS SDK (cached) ----
      - name: Restore OHOS SDK cache
        id: sdk-cache
        uses: actions/cache@v4
        with:
          path: ~/ohos-native
          key: ohos-native-linux-x64-${{ env.OHOS_SDK_RELEASE }}

      - name: Download OHOS SDK
        if: steps.sdk-cache.outputs.cache-hit != 'true'
        run: |
          set -euxo pipefail
          curl -fL --retry 3 -o "$RUNNER_TEMP/native-linux.zip" \
            "https://github.com/jerry-271828/iperf/releases/download/ci-toolchain-${OHOS_SDK_RELEASE}/${OHOS_NATIVE_ZIP}"
          echo "${OHOS_NATIVE_SHA256}  $RUNNER_TEMP/native-linux.zip" | sha256sum -c -
          mkdir -p ~/ohos-native
          unzip -q "$RUNNER_TEMP/native-linux.zip" -d ~/ohos-native

      - name: Setup OHOS environment
        run: |
          NATIVE="$HOME/ohos-native/native"
          test -x "$NATIVE/llvm/bin/clang"
          test -d "$NATIVE/sysroot"
          echo "OHOS_NATIVE=$NATIVE" >> "$GITHUB_ENV"
          echo "OHOS_SYSROOT=$NATIVE/sysroot" >> "$GITHUB_ENV"

      # ---- OpenBLAS (cached per-version) ----
      - name: Restore OpenBLAS cache
        id: blas-cache
        uses: actions/cache@v4
        with:
          path: /tmp/openblas-ohos
          key: openblas-ohos-${{ inputs.openblas_version || '0.3.28' }}

      - name: Cross-compile OpenBLAS
        if: steps.blas-cache.outputs.cache-hit != 'true'
        env:
          OPENBLAS_VER: ${{ inputs.openblas_version || '0.3.28' }}
        run: |
          set -euxo pipefail
          curl -fL --retry 3 -o "$RUNNER_TEMP/openblas.tar.gz" \
            "https://github.com/OpenMathLib/OpenBLAS/archive/refs/tags/v${OPENBLAS_VER}.tar.gz"
          tar xzf "$RUNNER_TEMP/openblas.tar.gz" -C "$RUNNER_TEMP"
          cd "$RUNNER_TEMP/OpenBLAS-${OPENBLAS_VER}"
          make -j"$(nproc)" libs \
            TARGET=ARMV8 BINARY=64 \
            CC="$OHOS_NATIVE/llvm/bin/clang --target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT" \
            AR="$OHOS_NATIVE/llvm/bin/llvm-ar" \
            RANLIB="$OHOS_NATIVE/llvm/bin/llvm-ranlib" \
            HOSTCC=gcc \
            NO_SHARED=1 NO_LAPACK=1 NO_FORTRAN=1 \
            NO_AFFINITY=1 USE_OPENMP=0 DYNAMIC_ARCH=0 CROSS=1
          make install PREFIX=/tmp/openblas-ohos NO_SHARED=1 NO_LAPACK=1

##############################################################################
# Job 2: 构建 PyTorch（依赖 Job 1 的缓存）
##############################################################################
  build-pytorch:
    needs: build-deps
    runs-on: ubuntu-24.04
    timeout-minutes: 420
    env:
      CCACHE_DIR: /tmp/ccache
      CCACHE_MAXSIZE: 4G
    steps:
      - uses: actions/checkout@v4

      - name: Install host build tools
        run: |
          sudo apt-get -y update
          sudo apt-get install -y cmake ninja-build curl unzip \
            python3 python3-pip python3-venv python3-dev \
            ccache qemu-user-static
          pip3 install --break-system-packages \
            numpy pyyaml typing_extensions setuptools wheel

      # ---- Restore all caches ----
      - name: Restore ccache
        uses: actions/cache@v4
        with:
          path: /tmp/ccache
          key: ccache-pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}-${{ github.run_id }}
          restore-keys: |
            ccache-pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}-
            ccache-pytorch-ohos-

      - name: Configure ccache
        run: |
          mkdir -p /tmp/ccache
          ccache -M ${CCACHE_MAXSIZE} -o cache_dir="$CCACHE_DIR"
          ccache -z

      - name: Restore OHOS SDK cache
        uses: actions/cache@v4
        with:
          path: ~/ohos-native
          key: ohos-native-linux-x64-${{ env.OHOS_SDK_RELEASE }}

      - name: Restore OpenBLAS cache
        uses: actions/cache@v4
        with:
          path: /tmp/openblas-ohos
          key: openblas-ohos-${{ inputs.openblas_version || '0.3.28' }}

      # ---- Setup environment ----
      - name: Setup environment
        run: |
          NATIVE="$HOME/ohos-native/native"
          test -x "$NATIVE/llvm/bin/clang" || { echo "OHOS SDK not found!"; exit 1; }
          test -f /tmp/openblas-ohos/lib/libopenblas.a || { echo "OpenBLAS not found!"; exit 1; }
          {
            echo "OHOS_NATIVE=$NATIVE"
            echo "OHOS_SYSROOT=$NATIVE/sysroot"
          } >> "$GITHUB_ENV"

      # ---- Checkout PyTorch ----
      - name: Checkout PyTorch
        uses: actions/checkout@v4
        with:
          repository: pytorch/pytorch
          ref: ${{ inputs.pytorch_ref || 'v2.5.1' }}
          path: pytorch-src
          submodules: recursive
          fetch-depth: 1

      # ---- Native Sleef Tools (from PyTorch submodule) ----
      - name: Restore native sleef cache
        id: sleef-cache
        uses: actions/cache@v4
        with:
          path: /tmp/sleef-native-install
          key: sleef-native-${{ inputs.pytorch_ref || 'v2.5.1' }}

      - name: Build native sleef tools
        if: steps.sleef-cache.outputs.cache-hit != 'true'
        run: |
          SLEEF_SRC="${{ github.workspace }}/pytorch-src/third_party/sleef"
          mkdir -p /tmp/sleef-native-build && cd /tmp/sleef-native-build
          CC=gcc CXX=g++ cmake "$SLEEF_SRC" -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DSLEEF_BUILD_GNUABI_LIBS=ON \
            -DSLEEF_BUILD_TESTS=OFF \
            -DCMAKE_INSTALL_PREFIX=/tmp/sleef-native-install
          CC=gcc CXX=g++ ninja -j"$(nproc)" || true
          mkdir -p /tmp/sleef-native-install/bin
          for tool in mkdisp mkrename mkrename_gnuabi mkalias; do
            find . -name "$tool" -type f -executable -exec cp {} /tmp/sleef-native-install/bin/ \; 2>/dev/null || true
          done
          [ ! -f /tmp/sleef-native-install/bin/mkalias ] && [ -f /tmp/sleef-native-install/bin/mkrename_gnuabi ] && \
            ln -sf mkrename_gnuabi /tmp/sleef-native-install/bin/mkalias
          ls -la /tmp/sleef-native-install/bin/

      # ---- Prepare CMake cache + Macros.h patch ----
      - name: Prepare build
        id: prepare
        run: |
          HOST_PYTHON_INCLUDE=$(python3 -c "import sysconfig; print(sysconfig.get_path('include'))")
          HOST_NUMPY_INCLUDE=$(python3 -c "import numpy; print(numpy.get_include())")
          TOOLCHAIN_FILE="${{ github.workspace }}/cmake/toolchain-ohos.cmake"
          {
            echo "HOST_PYTHON_INCLUDE=$HOST_PYTHON_INCLUDE"
            echo "HOST_NUMPY_INCLUDE=$HOST_NUMPY_INCLUDE"
            echo "TOOLCHAIN_FILE=$TOOLCHAIN_FILE"
          } >> "$GITHUB_ENV"

      # ---- Build PyTorch ----
      - name: Build PyTorch
        working-directory: pytorch-src
        run: |
          set +e -xo pipefail  # +e: override GitHub's bash -e default

          export CC="ccache $OHOS_NATIVE/llvm/bin/clang"
          export CXX="ccache $OHOS_NATIVE/llvm/bin/clang++"
          TARGET_FLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -fPIC -D__MUSL__ -D__OHOS__"
          export CFLAGS="$TARGET_FLAGS"
          export CXXFLAGS="$TARGET_FLAGS"
          export LDFLAGS="--target=$OHOS_TARGET --sysroot=$OHOS_SYSROOT -Wl,--code-sign"

          export CMAKE_TOOLCHAIN_FILE="$TOOLCHAIN_FILE"
          export CMAKE_CROSSCOMPILING=TRUE
          export CMAKE_SYSTEM_NAME=Linux
          export CMAKE_SYSTEM_PROCESSOR=aarch64
          export CMAKE_PREFIX_PATH="/tmp/openblas-ohos"
          export PYTHON_INCLUDE_DIR="$HOST_PYTHON_INCLUDE"
          export NUMPY_INCLUDE_DIR="$HOST_NUMPY_INCLUDE"
          export OpenBLAS_INCLUDE_DIR=/tmp/openblas-ohos/include
          export OpenBLAS_LIBRARIES=/tmp/openblas-ohos/lib/libopenblas.a

          # QEMU for aarch64 host tools (protoc etc.)
          sudo update-binfmts --enable qemu-aarch64 2>/dev/null || true
          # QEMU binfmt 需要找到 musl 动态链接器。直接 symlink 到 /lib/
          sudo mkdir -p /lib
          # 在 sysroot 中找 musl 动态链接器
          echo "=== Sysroot structure ==="
          ls -d "$OHOS_SYSROOT"/lib* "$OHOS_SYSROOT"/usr/lib* 2>/dev/null || true
          LOADER=$(find "$OHOS_SYSROOT" -name "ld-musl*" -o -name "ld-linux*" 2>/dev/null | head -1)
          echo "Found loader: $LOADER"
          if [ -n "$LOADER" ]; then
            sudo mkdir -p /lib
            sudo ln -sf "$LOADER" /lib/ld-musl-aarch64.so.1 2>/dev/null || true
            ls -la /lib/ld-musl* 2>/dev/null || true
          else
            echo "WARNING: No dynamic linker found in sysroot - QEMU protoc will fail!"
          fi

          # Install sleef native tools to /bin/
          if [ -d /tmp/sleef-native-install/bin ]; then
            for tool in /tmp/sleef-native-install/bin/*; do
              name=$(basename "$tool")
              sudo cp "$tool" "/usr/local/bin/$name" 2>/dev/null || true
              sudo ln -sf "/usr/local/bin/$name" "/bin/${name%_gnuabi}" 2>/dev/null || true
              echo "Installed sleef tool: $name"
            done
          fi

          # Patch Macros.h for musl __assert_fail
          python3 "${{ github.workspace }}/scripts/patch-macros-musl.py" c10/macros/Macros.h || echo "Macros.h patch skipped"

          pip3 install --break-system-packages -r requirements-build.txt 2>/dev/null || true

          echo "=== Build environment ==="
          echo "CC=$CC"
          echo "CFLAGS=$CFLAGS"
          echo "LDFLAGS=$LDFLAGS"
          echo "TOOLCHAIN=$CMAKE_TOOLCHAIN_FILE"

          # THE MAIN BUILD
          python3 setup.py build -j"$(nproc)" || {
            echo "=== Build failed ==="
            find build -name "CMakeError.log" -exec cat {} \; 2>/dev/null
            exit 1
          }

          echo "=== Build complete ==="
          ccache -s || true

      # ---- Sign + Verify + Package ----
      - name: Verify code signatures
        if: success()
        run: |
          SO_FILES=$(find pytorch-src/build -name "*.so" -type f ! -type l 2>/dev/null)
          ALL_OK=true
          for so in $SO_FILES; do
            if "$OHOS_NATIVE/llvm/bin/llvm-readelf" -S "$so" 2>/dev/null | grep -q codesign; then
              python3 scripts/verify-codesign.py "$so" || ALL_OK=false
            else
              echo "WARNING: unsigned $so"
              ALL_OK=false
            fi
          done
          $ALL_OK && echo "All .so signatures verified" || echo "Some signatures missing/invalid"

      - name: Build wheel
        if: success()
        working-directory: pytorch-src
        run: |
          python3 setup.py bdist_wheel -d "$RUNNER_TEMP/wheels" || true
          for whl in "$RUNNER_TEMP/wheels"/*.whl; do
            [ -f "$whl" ] || continue
            NEW_NAME=$(basename "$whl" | sed 's/linux_x86_64/linux_arm64_ohos/g')
            [ "$whl" != "$RUNNER_TEMP/wheels/$NEW_NAME" ] && mv "$whl" "$RUNNER_TEMP/wheels/$NEW_NAME"
          done
          ls -la "$RUNNER_TEMP/wheels/" || echo "No wheels built"

      - name: Upload wheel
        uses: actions/upload-artifact@v4
        with:
          name: pytorch-ohos-${{ inputs.pytorch_ref || 'v2.5.1' }}
          path: ${{ runner.temp }}/wheels/*.whl
          if-no-files-found: warn

      - name: Build summary
        if: always()
        run: |
          {
            echo "## PyTorch OHOS Build"
            echo "| Item | Value |"
            echo "|------|-------|"
            echo "| Ref | ${{ inputs.pytorch_ref || 'v2.5.1' }} |"
            echo "| Target | $OHOS_TARGET |"
            echo "| SDK | $OHOS_SDK_RELEASE |"
            echo ""
            echo "### On device"
            echo '```sh'
            echo 'pip install pytorch-*.whl'
            echo 'ohos-pip-autosign activate  # if needed'
            echo '```'
            echo ""
            ccache -s 2>/dev/null || true
          } >> "$GITHUB_STEP_SUMMARY"
